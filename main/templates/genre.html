{% extends "base.html" %}
{% block title %} Главная{% endblock title %}
{% block content %}
    <table>
    <thead>
        <tr>
            <td>№</td>
            <td>Название</td>
            <td>Название на англ.</td>
            <td>Описание</td>
            <td></td>
            <td></td>
        </tr>
    </thead>

    <tbody>
        {% for g in genres %}
            <tr>
                <td>{{g.id}}</td>
                <td>{{g.name_ru}}</td>
                <td>{{g.name_an}}</td>
                <td>{{g.description}}</td>
                <td><a href="/delgenre/{{g.id}}">Удалить</a></td>
                <td><a href="/editgenre/{{g.id}}  ">Редактировать</a></td>
            </tr>
            
        {% endfor %}
    </tbody>
</table>
<a href="/addgenre">Добавить жанр</a>
{% endblock content %}
